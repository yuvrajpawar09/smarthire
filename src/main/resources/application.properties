spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smarthire_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:smarthire-local-secret-key-must-be-32-characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

file.upload-dir=uploads/
ml.service.url=${ML_SERVICE_URL:http://localhost:5000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB